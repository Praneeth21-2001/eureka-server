server:
  port: ${PORT:8070}

spring:
  application:
    name: EUREKA-SERVER

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}

  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:${server.port}/eureka/}
